<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Decision Desk</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section class="hero">
      <div>
        <p class="eyebrow">Decision Desk</p>
        <h1>Know what to work on next.</h1>
        <p class="subtitle">
          Add your tasks, rate their impact, urgency, and effort, then let the desk rank your priorities.
        </p>
      </div>

      <div class="hero-card">
        <span class="hero-number" id="taskCount">0</span>
        <span class="hero-label">active decisions</span>
      </div>
    </section>

    <section class="panel">
      <form id="taskForm" class="task-form">
        <div class="field full">
          <label for="taskTitle">What needs a decision?</label>
          <input 
            id="taskTitle" 
            type="text" 
            placeholder="Example: Finish history project"
            maxlength="80"
            required
          />
        </div>

        <div class="field">
          <label for="impact">Impact</label>
          <select id="impact">
            <option value="5">Huge</option>
            <option value="4">High</option>
            <option value="3" selected>Medium</option>
            <option value="2">Low</option>
            <option value="1">Tiny</option>
          </select>
        </div>

        <div class="field">
          <label for="urgency">Urgency</label>
          <select id="urgency">
            <option value="5">Today</option>
            <option value="4">Soon</option>
            <option value="3" selected>This week</option>
            <option value="2">Later</option>
            <option value="1">Someday</option>
          </select>
        </div>

        <div class="field">
          <label for="effort">Effort</label>
          <select id="effort">
            <option value="1">Tiny</option>
            <option value="2">Small</option>
            <option value="3" selected>Medium</option>
            <option value="4">Large</option>
            <option value="5">Huge</option>
          </select>
        </div>

        <button class="primary-btn full" type="submit">Add decision</button>
      </form>
    </section>

    <section class="toolbar">
      <div>
        <h2>Your ranked list</h2>
        <p id="summaryText">Add your first task to begin.</p>
      </div>

      <div class="toolbar-actions">
        <button id="showAllBtn" class="ghost-btn active" type="button">All</button>
        <button id="showActiveBtn" class="ghost-btn" type="button">Active</button>
        <button id="showDoneBtn" class="ghost-btn" type="button">Done</button>
        <button id="clearDoneBtn" class="danger-btn" type="button">Clear done</button>
      </div>
    </section>

    <section id="taskList" class="task-list" aria-live="polite"></section>

    <section id="emptyState" class="empty-state">
      <div class="empty-icon">✨</div>
      <h2>No decisions yet</h2>
      <p>Add one task above. Decision Desk will rank it instantly.</p>
    </section>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="scrip.js"></script>
</body>
</html>
